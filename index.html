
<script>
    window.onload = function() {
        fetchBoards();
    };

    // 목록 조회
    function fetchBoards() {
        fetch("__________")
            .then(response => response.__________())
            .then(data => {
                const listContainer = document.getElementById("board-list");
                listContainer.innerHTML = "";

                if (data.length === 0) {
                    listContainer.innerHTML = "<p>등록된 게시글이 없습니다.</p>";
                    return;
                }

                data.forEach(board => {
                    const boardItem = document.createElement("div");
                    boardItem.className = "board-item";

                    boardItem.innerHTML = `
                        <div class="title">[${board.id}] ${board.title}</div>
                        <div class="content">${board.content}</div>
                    `;

                    listContainer.appendChild(boardItem);
                });
            })
            .catch(error => {
                document.getElementById("board-list").innerHTML =
                    "<p style='color:red;'>서버 통신 실패</p>";
            });
    }

    // 글 등록
    function createPost() {
        const titleInput = document.getElementById("input-title");
        const contentInput = document.getElementById("input-content");

        if (!titleInput.value || !contentInput.value) {
            alert("제목과 내용을 모두 입력해 주세요.");
            return;
        }

        const postData = {
            title: titleInput.value,
            content: contentInput.value
        };

        fetch("__________", {
            method: "__________",
            headers: {
                "Content-Type": "__________"
            },
            body: __________(postData)
        })
        .then(response => {
            if (response.ok) {
                alert("성공적으로 등록되었습니다!");

                titleInput.value = "";
                contentInput.value = "";

                __________();
            } else {
                alert("등록에 실패했습니다.");
            }
        })
        .catch(error => {
            console.error("에러:", error);
        });
    }
</script>
